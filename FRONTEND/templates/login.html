{% extends "layout.html" %}
{% block title %}Login — SecureBank{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">

    <div class="card shadow-sm border-0 mt-5">
      <div class="card-body p-4">

        <!-- Header -->
        <div class="text-center mb-4">
          <div style="font-size: 2.5rem;">🏦</div>
          <h1 class="h4 mt-2 mb-1 fw-bold">SecureBank</h1>
          <p class="text-muted small">Please sign in to access your account</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('auth.login_submit') }}" novalidate>

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="Enter your username"
              required
              autocomplete="username"
              autofocus
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              Sign In
            </button>
          </div>

        </form>

        <!-- Demo credentials hint -->
        <hr class="mt-4" />
        <p class="text-muted text-center small mb-0">
          Demo account: <code>john_doe</code> / <code>password123</code>
        </p>

      </div>
    </div>

  </div>
</div>
{% endblock %}
